version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: finews_postgres
    environment:
      POSTGRES_DB: finews
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
